# discovery_config.toml - RED-TEAM HARDENED CONFIG
# Configuration for bounded page-family discovery.

[defaults]
max_depth = 2
max_pages_per_source = 200
max_pages_per_family = 20
max_requests_per_minute = 20
max_total_requests = 200
max_response_bytes = 2097152      # 2 MB
request_timeout_seconds = 15.0
request_delay_seconds = 3.5
parallelism = 1
circuit_breaker_threshold = 10
robots_unavailable_blocks = true  # safe-block default
record_external_links = false

[soccerstats]
base_url = "https://www.soccerstats.com"

[forebet]
base_url = "https://www.forebet.com"

